<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SF Transit Board</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Transit" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <h1>Transit Board</h1>
        <div style="display:flex;align-items:center;gap:12px">
          <div id="live-badge" class="live-badge hidden">LIVE</div>
          <div id="clock" class="clock"></div>
        </div>
      </div>
      <div class="search-container">
        <input
          type="text"
          id="destination-input"
          placeholder="Where are you going?"
          autocomplete="off"
        />
        <button id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div id="suggestions" class="suggestions hidden"></div>
      </div>
      <div id="destination-display" class="destination-display hidden"></div>
      <div id="recommendation" class="recommendation hidden"></div>
      <div class="tabs">
        <button class="tab active" data-tab="bus">Bus</button>
        <button class="tab" data-tab="ebike">E-Bike</button>
        <button class="tab" data-tab="walk">Walk</button>
      </div>
    </header>

    <main>
      <div id="arrivals-list" class="arrivals-list">
        <div class="empty-state">Loading...</div>
      </div>
    </main>
  </div>

  <!-- Journey detail modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
