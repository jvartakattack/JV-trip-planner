<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>JV Trips</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JV Trips" />
  <link rel="apple-touch-icon" id="apple-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link id="theme-stylesheet" rel="stylesheet" href="styles.css?v=25" />
  <script>
    // Kill any existing service worker immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
    }
  </script>
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <h1 class="landing-title">JV Trips</h1>
    <p class="landing-subtitle">Where to, queen?</p>
    <div class="landing-cards">
      <button class="landing-card" data-direction="outbound">
        <span class="landing-icon">🚀</span>
      </button>
      <button class="landing-card" data-direction="inbound">
        <span class="landing-icon">🏠</span>
      </button>
    </div>
    <div class="theme-picker">
      <button data-theme="default" class="active">Original</button>
      <button data-theme="sleek">Sleek</button>
      <button data-theme="genz">Gen-Z</button>
    </div>
  </div>

  <!-- Main app (hidden until direction chosen) -->
  <div id="app" class="hidden">
    <header>
      <div class="header-top">
        <button id="back-btn" class="back-btn" aria-label="Back">‹</button>
        <h1>JV Trips</h1>
        <div style="display:flex;align-items:center;gap:12px">
          <div id="live-badge" class="live-badge hidden">LIVE</div>
          <div id="clock" class="clock"></div>
        </div>
      </div>
      <div class="search-container">
        <input
          type="text"
          id="destination-input"
          placeholder="Where are you going?"
          autocomplete="off"
        />
        <button id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button id="clear-dest-btn" class="clear-dest-btn hidden" aria-label="Clear destination">&times;</button>
        <div id="suggestions" class="suggestions hidden"></div>
      </div>
      <div id="recommendation" class="recommendation hidden"></div>
    </header>

    <main>
      <div id="explore-section" class="explore-section collapsed">
        <button id="explore-toggle" class="explore-toggle">
          <span class="explore-label">Explore routes</span>
          <span class="explore-chevron">&#x203A;</span>
        </button>
        <div class="explore-content">
          <div class="explore-inner">
            <div class="tabs">
              <button class="tab active" data-tab="bus">Bus</button>
              <button class="tab" data-tab="ebike">E-Bike</button>
              <button class="tab" data-tab="walk">Walk</button>
            </div>
            <div id="arrivals-list" class="arrivals-list">
              <div class="empty-state">Loading...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Journey detail modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=25"></script>
  <script>
    // Theme switcher
    (function() {
      var themes = {
        default: 'styles.css?v=25',
        sleek: 'styles-sleek.css?v=1',
        genz: 'styles-genz.css?v=1'
      };
      var themeMeta = {
        default: '#0f1117',
        sleek: '#f5f5f7',
        genz: '#1a1025'
      };
      var saved = localStorage.getItem('jvtrips-theme') || 'default';
      var link = document.getElementById('theme-stylesheet');
      var metaTheme = document.querySelector('meta[name="theme-color"]');
      if (saved !== 'default') {
        link.href = themes[saved];
        if (metaTheme) metaTheme.content = themeMeta[saved];
      }
      document.querySelectorAll('.theme-picker button').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.theme === saved);
        btn.addEventListener('click', function() {
          var t = btn.dataset.theme;
          link.href = themes[t];
          if (metaTheme) metaTheme.content = themeMeta[t] || '#0f1117';
          localStorage.setItem('jvtrips-theme', t);
          document.querySelectorAll('.theme-picker button').forEach(function(b) {
            b.classList.toggle('active', b.dataset.theme === t);
          });
        });
      });
    })();

    // Generate emoji app icon dynamically
    (function() {
      var sizes = [192, 512];
      sizes.forEach(function(size) {
        var c = document.createElement('canvas');
        c.width = size; c.height = size;
        var ctx = c.getContext('2d');
        var cs = getComputedStyle(document.documentElement);
        ctx.fillStyle = cs.getPropertyValue('--bg').trim() || '#0f1117';
        ctx.fillRect(0, 0, size, size);
        ctx.font = (size * 0.65) + 'px "Apple Color Emoji", "Segoe UI Emoji", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u{1F478}', size / 2, size * 0.52);
        var url = c.toDataURL('image/png');
        if (size === 192) {
          var link = document.getElementById('apple-icon');
          if (link) link.href = url;
        }
      });
    })();
  </script>
</body>
</html>
